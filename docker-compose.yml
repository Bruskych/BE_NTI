version: '3.8'

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: nti-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
            - backend_vendor:/var/www/vendor
        command: >
            sh -c "
            if [ ! -L public/storage ]; then
              php artisan storage:link;
            fi &&
            exec php-fpm"
        env_file:
            - .env
        depends_on:
            db:
                condition: service_started
            redis:
                condition: service_started
        networks:
            - nti-network

    webserver:
        image: nginx:alpine
        container_name: nti-webserver
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx:/etc/nginx/conf.d/
            - ./storage/app/public:/var/www/storage/app/public:ro
        depends_on:
            - app
        networks:
            - nti-network

    phpmyadmin:
        image: phpmyadmin
        container_name: nti-phpmyadmin
        restart: unless-stopped
        ports:
            - "8080:80"
        environment:
            PMA_HOST: db
            MYSQL_ROOT_PASSWORD: root
        depends_on:
            - db
        networks:
            - nti-network

    mailpit:
        image: 'axllent/mailpit:latest'
        container_name: nti-mailpit
        ports:
            - '1025:1025'
            - '8025:8025'
        networks:
            - nti-network

    db:
        image: mysql:8.0
        container_name: nti-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: nti_database
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3307:3306"
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - nti-network

    redis:
        image: redis:alpine
        container_name: nti-redis
        restart: unless-stopped
        networks:
            - nti-network

    queue:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: nti-queue
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
            - backend_vendor:/var/www/vendor
        command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
        env_file:
            - .env
        depends_on:
            - db
            - redis
        networks:
            - nti-network

    scheduler:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: nti-scheduler
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
            - backend_vendor:/var/www/vendor
        command: php artisan schedule:work
        env_file:
            - .env
        depends_on:
            - db
            - redis
        networks:
            - nti-network

networks:
    nti-network:
        name: nti-network
        driver: bridge

volumes:
    dbdata:
        driver: local
    backend_vendor:
