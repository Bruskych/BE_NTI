services:

    phpmyadmin:
        image: phpmyadmin
        container_name: nti-phpmyadmin
        restart: unless-stopped
        ports:
            - "8080:80"
        environment:
            PMA_HOST: db
            MYSQL_ROOT_PASSWORD: root
        networks:
            - nti-network

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: nti-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - nti-network

    webserver:
        image: nginx:alpine
        container_name: nti-webserver
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx:/etc/nginx/conf.d/
        networks:
            - nti-network

    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '1025:1025'
            - '8025:8025'
            - '8026:8025'
        networks:
            - nti-network

    db:
        image: mysql:8.0
        container_name: nti-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: nti_database
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3307:3306"
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - nti-network

    redis:
        image: redis:alpine
        container_name: nti-redis
        networks:
            - nti-network

networks:
    nti-network:
        driver: bridge

volumes:
    dbdata:
        driver: local
